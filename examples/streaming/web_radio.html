<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@alexanderolsen/libsamplerate-js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dmisol/flexatar-virtual-webcam@latest/jslib/flx_render.js"></script>
    <!-- <script src="js/flx_render.js"></script> -->
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Radio Processor</title>
</head>
<body>
    <h1>Web Radio Processor</h1>
    <div id="2hide">
        <input type="text" id="url2play" value="https://radio.talkradio.co.uk/stream"/>
        <button id="processButton">Process and Play Radio</button>
    </div>
    <video id="videoElement" width="240" height="320" autoplay></video>
    <script>
               
        const duration1 = 6
        const duration2 = duration1/2
        const myEffect = new Effect(function calc(time) {
            const periods1 = time/duration1
            const periodCounter1 = Math.floor(periods1)
            const periods2 = time/duration2
            const periodCounter2 = Math.floor(periods2)
            const weight = periods2 - periodCounter2
                if (periodCounter1%2 == 0){
                    return {mode:2,parameter:weight}
                }else{
                    if (periodCounter2%2 == 0){
                    return {mode:1,parameter:weight}
                }else{
                    return {mode:1,parameter:1 - weight}
                }
            }
           
         });

        let jsonToBackend = {token:"sometoken",ftar:"dexter.p"}
        // let jsonToBackend = {token:"sometoken",ftar:"ftar_endpoint"}
        let client = new FlexatarClient(jsonToBackend.token)
        const flexatar1 = client.getFlexatar(jsonToBackend.ftar)

        const flexatarAnimator = new FlexatarAnimator();
        flexatar1.connectTo(flexatarAnimator);
      
        document.getElementById('processButton').addEventListener('click', function() {
            document.getElementById("2hide").style.display = 'none'
            const radioUrl = document.getElementById('url2play').value
            
            flexatarAnimator.addAuidoTrack(radioUrl);
            flexatarAnimator.setEffect(myEffect)
            flexatarAnimator.start()

            const mediaStream = flexatarAnimator.getMediaStream();
            var videoElement = document.getElementById('videoElement');
            videoElement.autoplay = true
            videoElement.controls = true
            videoElement.setAttribute('playsinline', '')
            videoElement.srcObject = mediaStream;
     
        });
    </script>
</body>
</html>

<body>



<video id="videoElement" width="240" height="320" autoplay></video>
<button id="start"  >Start</button>

<script>
let startButton = document.getElementById("start");

if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices
    .getUserMedia({audio: true,},)
    .then((stream) => {
       
        const flexatarAnimator = new FlexatarAnimator("token");
        flexatarAnimator.useFlexatars(null);
        
        flexatarAnimator.getMediaStream().then(mediaStream =>{
            var videoElement = document.getElementById('videoElement');
            videoElement.autoplay = true
            videoElement.controls = true
            videoElement.setAttribute('playsinline', '')
            videoElement.srcObject = mediaStream;
        });
       
        

        // const fvcStream = flexatarVirtualCameraStream("https://raw.githubusercontent.com/dmisol/flexatar-virtual-webcam/main/raw/flexatars/flx1.p",240,320,stream);

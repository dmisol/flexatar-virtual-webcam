<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@alexanderolsen/libsamplerate-js"></script>
    <script src="fvc_lib.js"></script>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual camera demo</title>

</head>
<body>



<video id="videoElement" width="240" height="320" autoplay></video>
<button id="start"  >Start</button>

<script>
let startButton = document.getElementById("start");

if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices
    .getUserMedia({audio: true,},)
    .then((stream) => {
       
        

        const fvcStream = flexatarVirtualCameraStream("/file/flexatars/flx1.p",240,320,stream);
        
        startButton.onclick = function(){
            var videoElement = document.getElementById('videoElement');
            videoElement.autoplay = true
            videoElement.controls = true
            videoElement.setAttribute('playsinline', '')
            videoElement.srcObject = fvcStream;
        }
            

        
    });
}
</script>
</body>
</html>

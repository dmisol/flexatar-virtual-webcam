  <div id="authWarning" class="auth-warning hidden">
    This page requires authorization to work.
  </div>

  <span id="appContainer" class="container">
    <h1>AI AGENT</h1>

    <div class="tabs">
      <button id="tabCalls" class="tab-button active">Calls</button>
      <button id="tabTemplates" class="tab-button">Templates</button>
    </div>

    <div id="callsTab" class="tab-content">
      <div class="section-header">
        <h2>Calls</h2>
        <button id="createCallBtn" type="button" aria-label="Create call" class="icon-button">+</button>
      </div>

      <div id="callForm" class="form-card hidden">
        <div class="form-error" id="callFormError"></div>

        <div class="call-form-body">
          <div class="call-form-fields">
            <div class="form-card call-template-frame">
              <div class="form-group">
                <label for="callTemplateId">Template</label>
                <select id="callTemplateId"></select>
                <p class="description">Select a template for this call.</p>
              </div>

              <div class="form-group">
                <label for="callMyName">My Name (shown to recipient)</label>
                <input type="text" id="callMyName" placeholder="Your name">
              </div>

              <div class="form-group">
              <label for="callInstructions">Instructions</label>
              <textarea id="callInstructions" rows="4" placeholder="List questions the agent should ask, or describe the topic for the conversation."></textarea>
              </div>

              <div class="form-group">
                <label for="callAbout">About Me</label>
                <textarea id="callAbout" rows="3" placeholder="Optional background"></textarea>
              </div>

              <div class="form-group">
                <label for="callAgentLanguage">Agent Speech Language</label>
                <input type="text" id="callAgentLanguage" placeholder="English">
              </div>

              <div class="form-group">
                <label for="callResponseLanguage">Response Language</label>
                <input type="text" id="callResponseLanguage" placeholder="English">
              </div>

              <div class="form-group">
                <label for="callVoiceId">Voice Id</label>
                <select id="callVoiceId">
                  <option value="alloy">alloy</option>
                  <option value="ash">ash</option>
                  <option value="ballad">ballad</option>
                  <option value="coral">coral</option>
                  <option value="echo">echo</option>
                  <option value="sage">sage</option>
                  <option value="shimmer">shimmer</option>
                  <option value="verse">verse</option>
                </select>
              </div>

              <div class="form-group">
                <label for="callMaxTalk">Max Talk Time (minutes)</label>
                <input type="number" id="callMaxTalk" min="1" max="180" placeholder="1 - 180" value="5">
              </div>

              <div class="form-group">
                <label for="callTemplateName">Template Name (optional)</label>
                <input type="text" id="callTemplateName" placeholder="New template name">
                <p class="description">Saving the template is optional.</p>
                <button id="saveTemplateFromCallBtn" type="button">Save Template</button>
              </div>
            </div>

            <div class="form-group">
              <label for="callAdditionalInstructions">Additional Instructions</label>
              <textarea id="callAdditionalInstructions" rows="4" placeholder="Optional extra instructions for the AI."></textarea>
            </div>

            <div class="form-group">
              <label for="callLinkName">Link Name (shown to you)</label>
              <input type="text" id="callLinkName" placeholder="Name shown in your call list">
            </div>

            <div class="button-row">
              <button id="saveCallBtn" type="button">Add Call</button>
              <button id="cancelCallBtn" type="button" class="button-secondary">Cancel</button>
            </div>
          </div>

          <div class="call-form-chooser">
            <div class="selected-flexatar">
              <div id="callFlexatarSelectedPreview" class="selected-flexatar-image"></div>
            </div>
            <div class="chooser chooser-vertical">
              <div id="callFlexatarChooser" class="chooser-list"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="callsEmpty" class="empty-state">No records yet.</div>
      <div id="callsList" class="list"></div>
    </div>

    <div id="templatesTab" class="tab-content hidden">
      <div class="section-header">
        <h2>Templates</h2>
      </div>

      <div id="templateForm" class="form-card hidden">
        <div class="form-error" id="templateFormError"></div>

        <div class="template-form-body">
          <div class="template-form-fields">
            <div class="form-group">
              <label for="templateName">Template Name</label>
              <input type="text" id="templateName" placeholder="Template name">
            </div>

            <div class="form-group">
              <label for="templateMyName">My Name (shown to recipient)</label>
              <input type="text" id="templateMyName" placeholder="Your name">
            </div>

            <div class="form-group">
              <label for="templateInstructions">Instructions</label>
              <textarea id="templateInstructions" rows="4" placeholder="List questions the agent should ask, or describe the topic for the conversation."></textarea>
            </div>

            <div class="form-group">
              <label for="templateAbout">About Me</label>
              <textarea id="templateAbout" rows="3" placeholder="Optional background"></textarea>
            </div>

            <div class="form-group">
              <label for="templateAgentLanguage">Agent Speech Language</label>
              <input type="text" id="templateAgentLanguage" placeholder="English">
            </div>

            <div class="form-group">
              <label for="templateResponseLanguage">Response Language</label>
              <input type="text" id="templateResponseLanguage" placeholder="English">
            </div>

            <div class="form-group">
              <label for="templateVoiceId">Voice Id</label>
              <select id="templateVoiceId">
                <option value="alloy">alloy</option>
                <option value="ash">ash</option>
                <option value="ballad">ballad</option>
                <option value="coral">coral</option>
                <option value="echo">echo</option>
                <option value="sage">sage</option>
                <option value="shimmer">shimmer</option>
                <option value="verse">verse</option>
              </select>
            </div>

            <div class="form-group">
              <label for="templateMaxTalk">Max Talk Time (minutes)</label>
              <input type="number" id="templateMaxTalk" min="1" max="180" placeholder="1 - 180">
            </div>

            <div class="button-row">
              <button id="saveTemplateBtn" type="button">Add Template</button>
              <button id="cancelTemplateBtn" type="button" class="button-secondary">Cancel</button>
            </div>
          </div>

          <div class="template-form-chooser">
            <div class="selected-flexatar">
              <div id="flexatarSelectedPreview" class="selected-flexatar-image"></div>
            </div>
            <div class="chooser chooser-vertical">
              <div id="flexatarChooser" class="chooser-list"></div>
            </div>
          </div>
        </div>

      </div>

      <div id="templatesEmpty" class="empty-state">No records yet.</div>
      <div id="templatesList" class="list"></div>
    </div>
  </span>

  <div id="linkModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Call Link</div>
      <div id="linkModalValue" class="modal-link"></div>
      <div id="linkModalStatus" class="modal-status"></div>
      <div class="modal-actions">
        <button id="linkModalCopy" type="button">Copy</button>
        <button id="linkModalClose" type="button" class="button-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="./bundle.js" defer></script>
</body>

</html>
